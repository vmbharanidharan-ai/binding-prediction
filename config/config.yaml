# Neo Binder Pipeline — global configuration
# Override paths for Longleaf: set NEO_BINDER_WORK_ROOT=/work/users/<onyen>

project:
  name: neo_binder_pipeline
  version: "1.0.0"

paths:
  work_root: "${NEO_BINDER_WORK_ROOT:-./work}"
  inputs_dir: "${NEO_BINDER_WORK_ROOT:-./work}/inputs"
  step1_outputs: "${NEO_BINDER_WORK_ROOT:-./work}/step1_structures"
  step2_outputs: "${NEO_BINDER_WORK_ROOT:-./work}/step2_scored"
  step3_outputs: "${NEO_BINDER_WORK_ROOT:-./work}/step3_binders"
  step4_outputs: "${NEO_BINDER_WORK_ROOT:-./work}/step4_validated"
  step5_outputs: "${NEO_BINDER_WORK_ROOT:-./work}/step5_ranked"
  embeddings_dir: "${NEO_BINDER_WORK_ROOT:-./work}/embeddings"
  logs_dir: "./logs"
  hla_fasta: "config/hla_sequences.fasta"   # legacy fallback only
  iedb_reference: "data/iedb_reference.csv"

hla:
  use_imgt: true              # auto-download IMGT sequences (no manual FASTA needed)
  auto_setup: true            # download + build index on first use
  fallback_to_local_fasta: true
  index_path: "hla/hla_index.pkl"
  missing_allele_handling:
    warn: true
    skip_if_absent: true

# Runtime profile: optimized (default) balances speed vs quality.
# Set profile: full to restore higher-accuracy settings.
runtime:
  profile: optimized

step1:
  backend: colabfold            # pmgen | colabfold
  num_models: 3              # optimized: 3 (full: 5)
  num_recycle: 1             # optimized: 1 (full: 3) — largest AF speed win
  # PMGen (Step 1 when backend=pmgen) — install via scripts/setup_pmgen_longleaf.sh
  pmgen_root: "${PMGEN_ROOT:-}"
  pmgen_env: "PMGen"
  pmgen_run_mode: "single"   # single | parallel
  pmgen_initial_guess: true  # recommended PMGen mode (fast, no homology modeling)
  pmgen_no_netmhcpan: true
  pmgen_models: ["model_1_ptm", "model_2_ptm", "model_3_ptm"]
  # ColabFold (Step 1 when backend=colabfold; also used for Step 4 multimer)
  # Set COLABFOLD_BIN env var on Longleaf (see slurm/common.sh).
  colabfold_cmd: "${COLABFOLD_BIN:-colabfold_batch}"
  colabfold_model_type: alphafold2_multimer_v3
  colabfold_pair_mode: unpaired+paired
  colabfold_rank_by: auto
  colabfold_min_chains: 2
  colabfold_data_dir: "${COLABFOLD_DATA_DIR:-${COLABFOLD_PARAMS_DIR:-}}"
  use_templates: false

step2:
  contact_distance_angstrom: 4.0
  rmsd_cluster_threshold: 2.0
  top_structures_per_peptide: 1   # optimized: 1 (full: 3)
  min_cluster_size: 1

step3:
  rfdiffusion_cmd: "python RFdiffusion/scripts/run_inference.py"
  num_designs_per_structure: 3    # optimized: 3 (full: 10)
  binder_length_min: 50
  binder_length_max: 80
  diffusion_steps: 25             # optimized: 25 (full: 50)
  rfdiffusion_weights: "${RFDIFFUSION_WEIGHTS:-${RFDIFFUSION_ROOT}/models}"

step4:
  num_models: 3                # optimized: 3 (full: 5)
  num_recycle: 1                 # optimized: 1 (full: 3)
  max_complexes_per_peptide: 3   # cap multimer jobs per peptide (biggest pipeline speed win)
  colabfold_multimer_cmd: "${COLABFOLD_BIN:-colabfold_batch}"
  colabfold_model_type: alphafold2_multimer_v3
  colabfold_pair_mode: unpaired+paired
  colabfold_rank_by: auto
  colabfold_min_chains: 3
  colabfold_data_dir: "${COLABFOLD_DATA_DIR:-${COLABFOLD_PARAMS_DIR:-}}"

rosetta:
  bin_path: ""                 # e.g. /nas/longleaf/.../rosetta_scripts.default.linuxgccrelease
  database_path: ""            # optional; uses Rosetta module default if empty
  interface_string: "A_BC"     # HLA heavy=A, peptide=B, beta2m=C — verify on your PDBs
  enabled: true                # set false to skip without code changes

mhcflurry:
  ba_mode: true                # enables IC50 output in addition to input percentile

step5:
  model_path: "step5_ml_model/model.pkl"
  pca_components: 50
  train_test_split_by: "gene"
  xgboost_params:
    objective: "rank:pairwise"
    eta: 0.1
    max_depth: 6
    subsample: 0.8
    colsample_bytree: 0.8
    n_estimators: 100            # optimized: 100 (full: 200)

embeddings:
  esm2_model: "facebook/esm2_t33_650M_UR50D"
  prott5_model: "Rostlab/prot_t5_xl_half_uniref50-enc"
  run_prott5: false              # optimized: false — ESM-2 only (saves ~1-2h GPU)
  batch_size: 8
  device: "cuda"

slurm:
  partition_gpu: "a100-gpu,l40-gpu,volta-gpu,gpu"
  qos_gpu: "gpu_access"
  partition_cpu: "general"
  gpu_gres: "gpu:1"
  mem_gpu: "64G"
  mem_cpu: "32G"
  time_gpu: "24:00:00"
  time_cpu: "12:00:00"
  account: "${SLURM_ACCOUNT:-}"

features:
  core:
    - mhcflurry_presentation_percentile
    - netmhcpan_EL_rank
    - n_carriers_in_cohort
    - PSR_tumor
    - frameshift_flag
  structural:
    - structure_confidence_score
    - binder_structural_score
    - interface_plddt_mean
    - interface_pae_mean
    - contact_count
    - buried_surface_area
    - dG_separated
    - dSASA_int
    - delta_unsatHbonds
    - mhcflurry_ic50_log10
    - mhcflurry_affinity_percentile
    - mhcflurry_presentation_score
  embedding:
    - esm2_pca
    - prott5_pca
    - iedb_cosine_similarity_max
